# render.yaml - Render Blueprint for Exam Attendance Tracking
# This file allows you to deploy both services with one click
# See RENDER_DEPLOYMENT.md for detailed instructions

services:
  # Backend API Service (NestJS)
  - type: web
    name: exam-tracking-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # ⚠️ Set these manually in Render dashboard after creation:
      - key: MONGODB_URI
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # Auto-generated or auto-configured:
      - key: JWT_SECRET
        generateValue: true  # Render will generate a random value
      - key: CORS_ORIGIN
        fromService:
          name: exam-tracking-frontend
          type: static
          property: url
    healthCheckPath: /health
    plan: free  # Options: free, starter, standard, pro
    # autoDeploy: true  # Set to false to disable auto-deployment

  # Frontend Static Site (React + Vite)
  - type: static
    name: exam-tracking-frontend
    buildCommand: cd frontend && npm install && npm run build
    publishPath: ./frontend/dist
    envVars:
      # Automatically set to backend URL + /api
      - key: VITE_API_URL
        fromService:
          name: exam-tracking-api
          type: web
          property: url
          suffix: /api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate

# Optional: Add a managed PostgreSQL if you want to migrate from MongoDB
# databases:
#   - name: exam-tracking-db
#     databaseName: exam_tracking
#     user: exam_tracking_user
#     plan: free  # Options: free, starter, standard, pro